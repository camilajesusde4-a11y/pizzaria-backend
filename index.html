<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzaria Premium</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#d62828;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

header img{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.content{padding:10px;}

.nome{font-weight:bold;font-size:18px;}
.desc{font-size:12px;color:#666;margin:5px 0;}
.preco{color:#2a9d8f;font-weight:bold;}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2a9d8f;
  color:white;
  cursor:pointer;
}

/* CARRINHO */
.cart-button{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:#25d366;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  color:white;
}

#badge{
  position:absolute;
  top:5px;
  right:5px;
  background:red;
  color:white;
  font-size:12px;
  padding:3px 7px;
  border-radius:50%;
}

/* CART */
.cart{
  position:fixed;
  right:-100%;
  top:0;
  width:360px;
  height:100%;
  background:white;
  transition:0.3s;
  box-shadow:-5px 0 20px rgba(0,0,0,0.2);
  padding:15px;
  overflow:auto;
  z-index:999;
}

.cart.active{right:0;}

.cart-header{
  position:relative;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.close-cart{
  width:32px;
  height:32px;
  background:#d62828;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:absolute;
  top:-12px;
  left:-12px;
}

/* ITEM */
.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-bottom:8px;
  background:#f6f6f6;
  border-radius:10px;
}

.qtd{
  background:#d62828;
  color:white;
  padding:4px 8px;
  border-radius:50%;
  font-size:12px;
}

input{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

.finalizar{
  background:#d62828;
  margin-top:10px;
}

.total{
  margin-top:10px;
  font-weight:bold;
}

/* OVERLAY PIX */
.overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#0008;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
</style>
</head>

<body>

<header>
  <img src="https://via.placeholder.com/100" alt="Logo">
  <span>Pizzaria Premium</span>
</header>

<div class="container" id="menu"></div>

<div class="cart-button" onclick="toggleCart()">🛒 <span id="badge">0</span></div>

<div class="cart" id="cart">

<div class="cart-header">
  <h2>Seu Pedido</h2>
  <div class="close-cart" onclick="toggleCart()">✖</div>
</div>

<div id="itens"></div>

<div>Total: R$ <span id="total">0</span></div>

<input id="nome" placeholder="Nome">
<input id="endereco" placeholder="Endereço">
<input id="numero" placeholder="Número">

<button class="finalizar" onclick="finalizar()">Finalizar Pedido</button>

</div>

<script>

/* ===== 15 PIZZAS RESTAURADAS ===== */
const pizzas=[
{nome:"Calabresa",preco:30,desc:"Calabresa e queijo",img:"https://images.unsplash.com/photo-1601924582970"},
{nome:"Frango Catupiry",preco:35,desc:"Frango cremoso",img:"https://images.unsplash.com/photo-1604382354936"},
{nome:"4 Queijos",preco:38,desc:"Queijos especiais",img:"https://images.unsplash.com/photo-1594007654729"},
{nome:"Pepperoni",preco:40,desc:"Pepperoni italiano",img:"https://images.unsplash.com/photo-1593560708920"},
{nome:"Chocolate",preco:32,desc:"Chocolate derretido",img:"https://images.unsplash.com/photo-1605478371340"},
{nome:"Vegana",preco:29,desc:"Vegetais frescos",img:"https://images.unsplash.com/photo-1513104890138"},
{nome:"Portuguesa",preco:34,desc:"Presunto e ovos",img:"https://images.unsplash.com/photo-1604917877934"},
{nome:"Bacon",preco:36,desc:"Bacon crocante",img:"https://images.unsplash.com/photo-1542281286"},
{nome:"Marguerita",preco:28,desc:"Tomate e manjericão",img:"https://images.unsplash.com/photo-1548365328"},
{nome:"Atum",preco:33,desc:"Atum e cebola",img:"https://images.unsplash.com/photo-1611270629569"},
{nome:"Carne Seca",preco:37,desc:"Carne seca e catupiry",img:"https://images.unsplash.com/photo-1601924928359"},
{nome:"Frango Bacon",preco:39,desc:"Frango e bacon",img:"https://images.unsplash.com/photo-1593560708920"},
{nome:"Suprema",preco:42,desc:"Pizza completa",img:"https://images.unsplash.com/photo-1601924582970"},
{nome:"Especial da Casa",preco:45,desc:"Receita secreta",img:"https://images.unsplash.com/photo-1601924928359"},
{nome:"Napolitana",preco:31,desc:"Tomate e queijo",img:"https://images.unsplash.com/photo-1548365328"}
];

const menu=document.getElementById("menu");

pizzas.forEach(p=>{
menu.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="content">
<div class="nome">${p.nome}</div>
<div class="desc">${p.desc}</div>
<div class="preco">R$ ${p.preco}</div>
<button onclick="add('${p.nome}',${p.preco})">Adicionar</button>
</div>
</div>`;
});

/* ===== CARRINHO ===== */
let carrinho=[];

function add(nome,preco){
let item=carrinho.find(i=>i.nome===nome);
if(item) item.qtd++;
else carrinho.push({nome,preco,qtd:1});
render();
}

function render(){
let total=0,qtd=0;
let box=document.getElementById("itens");
box.innerHTML="";
carrinho.forEach(i=>{
total+=i.preco*i.qtd;
qtd+=i.qtd;
box.innerHTML+=`
<div class="item">
<span>${i.nome}</span>
<span class="qtd">${i.qtd}</span>
</div>`;
});
document.getElementById("total").innerText=total;
document.getElementById("badge").innerText=qtd;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* ===== PIX (RESTAURADO) ===== */
async function finalizar(){

const loading=document.createElement("div");
loading.className="overlay";
loading.innerHTML="<div style='background:white;padding:20px;border-radius:10px;'>Gerando PIX...</div>";
document.body.appendChild(loading);

const nome=document.getElementById("nome").value;
const total=document.getElementById("total").innerText;

const res=await fetch("https://pizzaria-backend-hfur.onrender.com/criar-pix",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
amount:total,
payerName:nome,
payerDocument:"12345678900"
})
});

const data=await res.json();

loading.remove();

/* POPUP PIX */
const popup=document.createElement("div");
popup.className="overlay";

popup.innerHTML=`
<div style="background:white;padding:20px;border-radius:12px;position:relative;width:320px;text-align:center">

<div onclick="this.parentElement.parentElement.remove()"
style="position:absolute;top:-10px;right:-10px;width:30px;height:30px;background:#d62828;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;">✖</div>

<h3>PIX Gerado</h3>

<canvas id="qr"></canvas>

<button onclick="navigator.clipboard.writeText('${data.copyPaste}')"
style="margin-top:10px;width:100%;">
Copiar PIX
</button>

</div>`;

document.body.appendChild(popup);

QRCode.toCanvas(document.getElementById("qr"), data.copyPaste);
}

</script>

</body>
</html>
